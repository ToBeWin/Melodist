name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows bundling dependencies
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run automated checks
        shell: bash
        run: |
          pnpm test
          pnpm lint
          pnpm smoke:library
          pnpm smoke:verify-library
          pnpm build
          cd src-tauri
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: Build macOS release bundles
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --ci --bundles app,dmg

      - name: Build Windows release bundle
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: pnpm tauri build --ci --bundles nsis

      - name: Build Linux release bundles
        if: runner.os == 'Linux'
        run: pnpm tauri build --ci --bundles deb,appimage

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: melodist-${{ runner.os }}-${{ runner.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: bundle
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect distributable assets
        run: node scripts/collect-release-assets.mjs release-artifacts upload

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --notes "Automated Melodist release build."

          if ! find upload -type f -print -quit | grep -q .; then
            echo "No release assets found" >&2
            exit 1
          fi

          gh release upload "$tag" upload/* --clobber
